security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        auth_public:
            pattern: ^/api/v1/auth/(register|login)$
            stateless: true
            security: false
        auth_refresh:
            pattern: ^/api/v1/auth/refresh$
            stateless: true
            lazy: true
            provider: app_user_provider
            entry_point: App\Security\RefreshCookieAuthenticator
            custom_authenticators:
                - App\Security\RefreshCookieAuthenticator
        api:
            pattern: ^/api
            stateless: true
            lazy: true
            provider: app_user_provider
            entry_point: App\Security\JwtAuthenticator
            custom_authenticators:
                - App\Security\JwtAuthenticator

    access_control:
        - { path: ^/api/v1/auth/(register|login)$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
